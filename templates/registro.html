<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - Techlog Solutions</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilo do projeto -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="auth-page auth-page--registro">
        <div class="auth-shell">
            <div class="auth-top-nav" aria-label="Navegação de autenticação">
                <a class="auth-top-link" href="/login">Login</a>
                <span class="auth-top-sep" aria-hidden="true">|</span>
                <a class="auth-top-link is-active" href="/registro">Registrar</a>
            </div>

            <div class="form-card auth-card">
                <h1 class="auth-form-title">Criar conta</h1>
                <p class="auth-form-subtitle">Cadastre-se para começar a usar o sistema.</p>

                <form id="formRegistro" class="form-registro" action="/registro" method="post">
                    <div class="form-group">
                        <label for="nome">Nome completo *</label>
                        <input type="text" id="nome" name="nome" class="form-control" value="{{ nome }}" placeholder="Seu nome" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" class="form-control" value="{{ email }}" placeholder="seuemail@exemplo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="senha">Senha *</label>
                        <input type="password" id="senha" name="senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirma_senha">Confirmar senha *</label>
                        <input type="password" id="confirma_senha" name="confirma_senha" class="form-control" placeholder="Digite a senha novamente" required>
                    </div>
                    
                    {% if error %}
                        <div class="alert-error" role="alert">
                            <p class="mb-0">{{ error }}</p>
                        </div>
                    {% endif %}
                    
                    <div class="form-actions auth-form-actions">
                        <button type="submit" class="btn btn-primary btn-lg">Cadastrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
